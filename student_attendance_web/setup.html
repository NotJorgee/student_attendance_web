<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Setup - Student Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="fade-in d-flex align-items-center justify-content-center">

    <div class="container" style="max-width: 450px;">
        <div class="card custom-card p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock fs-1" style="color: var(--primary-start);"></i>
                <h2 class="fw-bold mt-2">System Setup</h2>
                <p class="text-muted-custom">Create the primary admin account.</p>
            </div>
            
            <form id="setupForm">
                <div class="mb-3">
                    <label for="username" class="form-label text-muted-custom fw-bold">Instructor Username</label>
                    <input type="text" id="username" class="form-control custom-input" required placeholder="e.g., prof.smith">
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label text-muted-custom fw-bold">Password</label>
                    <div class="input-group">
                        <input type="password" id="password" class="form-control custom-input border-end-0 rounded-end-0" required placeholder="Create a strong password">
                        <span class="input-group-text custom-input-group border-start-0 rounded-start-0 cursor-pointer toggle-password" data-target="password">
                            <i class="bi bi-eye"></i>
                        </span>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label text-muted-custom fw-bold">Confirm Password</label>
                    <div class="input-group">
                        <input type="password" id="confirmPassword" class="form-control custom-input border-end-0 rounded-end-0" required placeholder="Type password again">
                        <span class="input-group-text custom-input-group border-start-0 rounded-start-0 cursor-pointer toggle-password" data-target="confirmPassword">
                            <i class="bi bi-eye"></i>
                        </span>
                    </div>
                </div>
                
                <div id="errorMessage" class="text-danger text-center mb-3" style="min-height: 20px; font-size: 0.85em;"></div>

                <button type="submit" class="btn custom-btn-primary w-100 py-2 fw-bold">Create Account</button>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-muted-custom mb-0">Already set up? <a href="index.html" class="text-decoration-none fw-bold" style="color: var(--primary-start);">Go to Login</a></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
