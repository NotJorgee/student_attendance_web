<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Student Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="fade-in">

    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar pt-3 pb-3 sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-light fs-4" href="#">
                <i class="bi bi-grid-1x2 me-2" style="color: var(--primary-start);"></i>Attendance<span style="color: var(--primary-start);">Portal</span>
            </a>
            <div class="d-flex align-items-center">
                <a href="index.html" class="btn custom-btn-outline px-4 fw-bold">Logout</a> 
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row g-4">
            
            <div class="col-lg-4">
                
                <div class="card custom-card p-4 mb-4">
                    <h5 class="fw-bold mb-3 border-bottom border-secondary pb-2">Register Student</h5>
                    <form id="registerStudentForm">
                        <div class="mb-3">
                            <label class="form-label text-muted-custom">Student ID</label>
                            <input type="text" id="newStudentId" class="form-control custom-input" required placeholder="e.g. 2026-001">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted-custom">Full Name</label>
                            <input type="text" id="newStudentName" class="form-control custom-input" required placeholder="Last Name, First Name">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted-custom">Section</label>
                            <input type="text" id="newStudentSection" class="form-control custom-input" required placeholder="e.g. IT-3A">
                        </div>
                        <button type="submit" class="btn custom-btn-primary w-100 fw-bold">Add Student</button>
                    </form>
                    <div id="regMessage" class="mt-3 text-center fw-bold" style="font-size: 0.9em;"></div>
                </div>

                <div class="card custom-card p-4">
                    <h5 class="fw-bold mb-3 border-bottom border-secondary pb-2">Export Report</h5>
                    <form id="reportForm">
                        <div class="mb-3">
                            <label class="form-label text-muted-custom">Date</label>
                            <input type="date" id="reportDate" class="form-control custom-input" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted-custom">Section</label>
                            <input type="text" id="reportSection" class="form-control custom-input" required placeholder="e.g. IT-3A">
                        </div>
                        <button type="submit" class="btn custom-btn-outline w-100 fw-bold">
                            <i class="bi bi-download me-2"></i>Download CSV
                        </button>
                    </form>
                    <div id="reportMessage" class="mt-3 text-center fw-bold" style="font-size: 0.9em;"></div>
                </div>

            </div>

            <div class="col-lg-8">
                <div class="card custom-card p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-2">
                        <h4 class="fw-bold m-0">Attendance Recording</h4>
                    </div>
                    
                    <div class="row g-3 mb-4 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label text-muted-custom">Date:</label>
                            <input type="date" id="attendanceDate" class="form-control custom-input" required>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label text-muted-custom">Section to Load:</label>
                            <input type="text" id="searchSection" class="form-control custom-input" placeholder="e.g. IT-3A">
                        </div>
                        <div class="col-md-3">
                            <button id="loadStudentsBtn" class="btn custom-btn-primary w-100 fw-bold">Load Class</button>
                        </div>
                    </div>

                    <form id="attendanceForm">
                        <div class="table-responsive">
                            <table class="table custom-table align-middle text-center mb-4">
                                <thead>
                                    <tr>
                                        <th class="text-start">Student ID</th>
                                        <th class="text-start">Name</th>
                                        <th>Present</th>
                                        <th>Absent</th>
                                        <th>Late</th>
                                    </tr>
                                </thead>
                                <tbody id="studentGridBody">
                                    <tr>
                                        <td colspan="5" class="text-muted-custom py-4">Enter a section and load the class to begin.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mt-2">
                            <div id="attMessage" class="fw-bold fs-5"></div>
                            <button type="submit" class="btn custom-btn-primary fw-bold px-5" style="display: none;" id="saveAttendanceBtn">
                                <i class="bi bi-floppy me-2"></i>Save Attendance
                            </button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
